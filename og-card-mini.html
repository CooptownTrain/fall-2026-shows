<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 400px; height: 400px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background:
      radial-gradient(circle at 30% 25%, rgba(220, 38, 38, 0.6) 0%, transparent 55%),
      radial-gradient(circle at 75% 75%, rgba(99, 102, 241, 0.6) 0%, transparent 55%),
      #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: #fff;
    text-align: center;
    padding: 40px;
  }
  .icon { font-size: 70px; margin-bottom: 8px; }
  .title {
    font-size: 68px;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -2px;
    background: linear-gradient(180deg, #fff, #fbbf24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .sub {
    font-size: 16px;
    font-weight: 700;
    color: rgba(255,255,255,0.8);
    margin-top: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="icon">🎟</div>
<div class="title">2026<br>SHOWS</div>
<div class="sub">Concerts · Comedy · Broadway</div>
</body>
</html>
